<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sozlamalar - O'zNNTMA A'zo Kabineti</title>
  <link rel="stylesheet" href="css/cabinet-app.css" />
</head>
<body>
<div class="app">
  <main class="main">

    <div class="page-heading">
      <h1>Sozlamalar</h1>
      <p class="page-sub">Shaxsiy ma'lumotlar va xabarnoma sozlamalari.</p>
    </div>

    <div class="settings-stack">
      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Mas'ul shaxs ma'lumotlari</div>
        </div>
        <div style="padding:18px;display:flex;flex-direction:column;gap:14px;">
          <div>
            <label class="field-label">F.I.Sh.</label>
            <input class="input" type="text" placeholder="Familiya Ism Sharif" />
          </div>
          <div>
            <label class="field-label">Telefon</label>
            <input class="input" type="tel" placeholder="+998 90 000 00 00" />
          </div>
          <div>
            <label class="field-label">Email</label>
            <input class="input" type="email" placeholder="email@tashkilot.uz" />
          </div>
          <div>
            <button class="btn" type="button">Saqlash</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Parolni o'zgartirish</div>
        </div>
        <div style="padding:18px;display:flex;flex-direction:column;gap:14px;">
          <div>
            <label class="field-label">Joriy parol</label>
            <input class="input" type="password" placeholder="Joriy parol" />
          </div>
          <div>
            <label class="field-label">Yangi parol</label>
            <input class="input" type="password" placeholder="Kamida 8 ta belgi" />
          </div>
          <div>
            <label class="field-label">Yangi parolni tasdiqlang</label>
            <input class="input" type="password" placeholder="Qayta kiriting" />
          </div>
          <div>
            <button class="btn" type="button">Parolni yangilash</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="panel-title">Xabarnoma sozlamalari</div>
        </div>
        <div style="padding:18px;display:flex;flex-direction:column;gap:12px;">
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;">
            <input type="checkbox" checked /> Email orqali eslatmalar
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;">
            <input type="checkbox" checked /> Hisobot muddatlari haqida xabar
          </label>
          <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:14px;">
            <input type="checkbox" /> Yangiliklar va e'lonlar
          </label>
          <div style="margin-top:4px;">
            <button class="btn" type="button">Saqlash</button>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>
<script src="js/cabinet-app.js"></script>
</body>
</html>
